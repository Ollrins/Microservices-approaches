services:
  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - security
      - uploader
      - minio
    networks:
      - microservices-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  security:
    image: python:3.11-alpine
    container_name: security-service
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python security_service.py"
    environment:
      - FLASK_APP=security_service.py
      - JWT_SECRET=your-secret-key
    volumes:
      - ./services/security:/app
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uploader:
    image: python:3.11-alpine
    container_name: uploader-service
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python uploader_service.py"
    volumes:
      - ./services/uploader:/app
    depends_on:
      - minio
    networks:
      - microservices-net
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio
    container_name: minio-storage
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - microservices-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vector:
    image: timberio/vector:0.33.0-alpine
    container_name: vector
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - VECTOR_REQUIRE_HEALTHY=true
    command: ["--config", "/etc/vector/vector.yaml"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8686:8686"
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - microservices-net
    restart: unless-stopped

  kibana:
    image: kibana:7.17.20
    container_name: kibana-v
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "8083:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - microservices-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=qwerty123456
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    ports:
      - "8082:3000"
    depends_on:
      - prometheus
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  minio-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:

networks:
  microservices-net:
    driver: bridge
